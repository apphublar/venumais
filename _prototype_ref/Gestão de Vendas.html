<style>
  :root {
    --bg: #f4f7f5;
    --card: #ffffff;
    --ink-1: #112019;
    --ink-2: #3d4a44;
    --ink-3: #7c8a83;
    --line: #e8edea;
    --line-2: #cbd5cf;
    --chip: #eef2f0;
    --green-50: #e7f6ef;
    --green-600: #128a5d;
    --green-700: #0e6e4a;
    --brand-g1: #15a06a;
    --brand-g2: #0d7a50;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--ink-1);
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(1200px 600px at 50% -10%, #eef2ef 0%, #e6eae7 55%, #dfe4e0 100%);
  }
  body { min-height: 100vh; }
  input::placeholder, textarea::placeholder { color: var(--ink-3); opacity: .85; }
  .cat-search::placeholder { color: rgba(255,255,255,0.8); }
  button { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.08); } 100% { transform: scale(1); } }
  @keyframes notifDown { from { opacity: 0; transform: translateY(-120%); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
